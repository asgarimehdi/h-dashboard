<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="220" height="56">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:currentColor;stop-opacity:1" />
      <stop offset="100%" style="stop-color:currentColor;stop-opacity:0.6" />
    </linearGradient>
    <style>
      .logo-text {
        font-family: 'Vazirmatn', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 700;
        fill: currentColor;
      }
    </style>
  </defs>
  <!-- Icon -->
  <g>
    <!-- Rounded background -->
    <rect x="2" y="2" width="52" height="52" rx="14" fill="currentColor" opacity="0.15"/>
    <!-- Medical cross -->
    <rect x="20" y="11" width="16" height="34" rx="3.5" fill="currentColor" opacity="0.9"/>
    <rect x="11" y="20" width="34" height="16" rx="3.5" fill="currentColor" opacity="0.9"/>
    <!-- Heart overlay -->
    <path d="M28 38 C28 38, 20 32, 20 27 C20 24, 22 22, 24 22 C25.2 22, 26.5 23, 28 24.5 C29.5 23, 30.8 22, 32 22 C34 22, 36 24, 36 27 C36 32, 28 38, 28 38 Z" fill="currentColor" opacity="0.4"/>
    <!-- Pulse line -->
    <path d="M6 28 L12 28 L15 23 L18 33 L21 28 L28 28 L31 25 L34 31 L37 28 L46 28" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="64" y="25" class="logo-text" font-size="17" letter-spacing="0.3" opacity="0.95">داشبورد سلامت</text>
  <text x="64" y="44" class="logo-text" font-size="11" font-weight="400" opacity="0.55">Health Dashboard</text>
</svg>
